name: CI Pipeline

on: [push] # Executa a cada push no repositório [cite: 56]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Baixa o código do repositório
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask coverage

      - name: Run Tests with Coverage
        run: python -m coverage run -m unittest -v tests/appTest.py

      - name: Generate Coverage Report
        run: python -m coverage report
  
  test-job2:
    runs-on: ubuntu-latest
    steps:
      - name: SAST Security Scan
        run: echo "Executando Static Application Security Testing (SAST)..."
